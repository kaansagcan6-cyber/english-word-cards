<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelime Kartları</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #d9d9d9;
      color: #000;
      min-height: 100vh;
    }
    .app {
      max-width: 1100px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 10px 24px 24px;
    }
    .top-tabs {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      font-weight: 900;
      font-size: 26px;
      margin-top: 4px;
      margin-bottom: 6px;
    }
    .top-tabs button {
      border: none;
      background: transparent;
      font-size: 26px;
      font-weight: 900;
      cursor: pointer;
      color: #000;
      padding: 0;
    }
    .divider {
      font-weight: 400;
    }
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      align-items: start;
      margin-top: 6px;
    }
    .sidebar {
      padding-top: 8px;
    }
    .sidebar-title {
      font-size: 28px;
      font-weight: 900;
      margin: 12px 0 10px 18px;
    }
    .level-box {
      width: 140px;
      height: 102px;
      background: #cfcfcf;
      border: none;
      border-radius: 20px;
      box-shadow: 8px 10px 14px rgba(0,0,0,0.18);
      margin-left: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      cursor: pointer;
      position: relative;
    }
    .level-box span:first-child {
      font-size: 68px;
      font-weight: 900;
      line-height: 1;
    }
    .arrow {
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
    }
    .level-menu {
      display: none;
      width: 140px;
      background: #cfcfcf;
      border-radius: 16px;
      box-shadow: 8px 10px 14px rgba(0,0,0,0.18);
      margin-top: 12px;
      overflow: hidden;
    }
    .level-menu.open { display: block; }
    .level-option {
      width: 100%;
      border: none;
      background: transparent;
      padding: 14px 18px;
      text-align: left;
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
    }
    .level-option:hover {
      background: rgba(255,255,255,0.3);
    }
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .section-label {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 2px;
      text-transform: uppercase;
    }
    .card {
      width: min(100%, 340px);
      height: 292px;
      background: #cfcfcf;
      border-radius: 24px;
      box-shadow: 10px 12px 16px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: clamp(34px, 6vw, 70px);
      font-weight: 900;
      margin-top: 2px;
      user-select: none;
      cursor: pointer;
    }
    .next-btn {
      margin-top: 18px;
      width: min(100%, 340px);
      height: 38px;
      border: none;
      border-radius: 999px;
      background: #cfcfcf;
      box-shadow: 10px 12px 16px rgba(0,0,0,0.18);
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
      line-height: 1;
    }
    .history-list {
      width: min(100%, 340px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
      max-height: 300px;
      overflow: auto;
      padding-right: 4px;
    }
    .history-item {
      background: #cfcfcf;
      border-radius: 16px;
      box-shadow: 8px 10px 14px rgba(0,0,0,0.18);
      padding: 16px 18px;
      font-weight: 900;
      font-size: 22px;
    }
    .history-item small {
      display: block;
      margin-top: 6px;
      font-size: 18px;
      font-weight: 700;
    }
    .empty {
      width: min(100%, 340px);
      background: #cfcfcf;
      border-radius: 16px;
      box-shadow: 8px 10px 14px rgba(0,0,0,0.18);
      padding: 18px;
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      margin-top: 16px;
    }
    .complete-box {
      width: min(100%, 420px);
      background: #cfcfcf;
      border-radius: 18px;
      box-shadow: 8px 10px 14px rgba(0,0,0,0.18);
      padding: 14px 18px;
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      margin-top: 14px;
      display: none;
    }
    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .sidebar-title {
        margin-left: 0;
      }
      .top-tabs {
        font-size: 22px;
      }
      .top-tabs button {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-tabs">
      <button id="learnTab">ÖĞREN</button>
      <span class="divider">|</span>
      <button id="historyTab">GEÇMİŞ</button>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-title">SEVİYE</div>
        <button class="level-box" id="levelToggle">
          <span id="levelText">A1</span>
          <span class="arrow">↓</span>
        </button>
        <div class="level-menu" id="levelMenu"></div>
      </aside>

      <main class="main">
        <div class="section-label" id="sectionLabel">ÖĞREN</div>
        <div class="card" id="card">APPLE</div>
        <button class="next-btn" id="nextBtn">SONRAKİ</button>
        <div class="complete-box" id="completeBox"></div>
        <div class="history-list" id="historyList" style="display:none;"></div>
        <div class="empty" id="emptyHistory" style="display:none;">Henüz geçmiş kart yok.</div>
      </main>
    </div>
  </div>

  <script>
    const levels = {
      A1: [
        { en: 'APPLE', tr: 'ELMA' },
        { en: 'BOOK', tr: 'KİTAP' },
        { en: 'WATER', tr: 'SU' },
        { en: 'HOUSE', tr: 'EV' },
        { en: 'FRIEND', tr: 'ARKADAŞ' }
      ],
      A2: [
        { en: 'WINDOW', tr: 'PENCERE' },
        { en: 'MARKET', tr: 'MARKET' },
        { en: 'MORNING', tr: 'SABAH' },
        { en: 'TRAVEL', tr: 'SEYAHAT' },
        { en: 'TEACHER', tr: 'ÖĞRETMEN' }
      ],
      B1: [
        { en: 'DECISION', tr: 'KARAR' },
        { en: 'SUCCESS', tr: 'BAŞARI' },
        { en: 'IMPROVE', tr: 'GELİŞTİRMEK' },
        { en: 'JOURNEY', tr: 'YOLCULUK' },
        { en: 'DEVELOP', tr: 'GELİŞTİRMEK' }
      ],
      B2: [
        { en: 'CHALLENGE', tr: 'ZORLUK' },
        { en: 'OPPORTUNITY', tr: 'FIRSAT' },
        { en: 'ANCIENT', tr: 'ESKİ / ANTİK' },
        { en: 'ACHIEVE', tr: 'BAŞARMAK' },
        { en: 'INCREASE', tr: 'ARTIRMAK' }
      ]
    };

    const levelKeys = Object.keys(levels);
    const learnTab = document.getElementById('learnTab');
    const historyTab = document.getElementById('historyTab');
    const sectionLabel = document.getElementById('sectionLabel');
    const card = document.getElementById('card');
    const nextBtn = document.getElementById('nextBtn');
    const historyList = document.getElementById('historyList');
    const emptyHistory = document.getElementById('emptyHistory');
    const levelToggle = document.getElementById('levelToggle');
    const levelMenu = document.getElementById('levelMenu');
    const levelText = document.getElementById('levelText');
    const completeBox = document.getElementById('completeBox');

    let currentLevel = localStorage.getItem('currentLevel') || 'A1';
    let currentIndex = Number(localStorage.getItem('currentIndex') || 0);
    let currentSide = 'en';
    let currentTab = 'learn';
    let historyWords = JSON.parse(localStorage.getItem('historyWords') || '[]');

    function saveState() {
      localStorage.setItem('currentLevel', currentLevel);
      localStorage.setItem('currentIndex', currentIndex);
      localStorage.setItem('historyWords', JSON.stringify(historyWords));
    }

    function currentWords() {
      return levels[currentLevel];
    }

    function buildLevelMenu() {
      levelMenu.innerHTML = levelKeys.map(level => `
        <button class="level-option" data-level="${level}">${level}</button>
      `).join('');

      levelMenu.querySelectorAll('.level-option').forEach(btn => {
        btn.addEventListener('click', () => {
          currentLevel = btn.dataset.level;
          currentIndex = 0;
          currentSide = 'en';
          levelText.textContent = currentLevel;
          levelMenu.classList.remove('open');
          completeBox.style.display = 'none';
          saveState();
          render();
        });
      });
    }

    function renderCard() {
      const words = currentWords();
      if (currentIndex >= words.length) currentIndex = words.length - 1;
      const word = words[currentIndex];
      card.textContent = currentSide === 'en' ? word.en : word.tr;
      levelText.textContent = currentLevel;
    }

    function addCurrentToHistory() {
      const word = currentWords()[currentIndex];
      const exists = historyWords.some(item => item.en === word.en && item.tr === word.tr);
      if (!exists) {
        historyWords.unshift(word);
        saveState();
      }
    }

    function renderHistory() {
      if (historyWords.length === 0) {
        historyList.style.display = 'none';
        emptyHistory.style.display = 'block';
        return;
      }
      emptyHistory.style.display = 'none';
      historyList.style.display = 'flex';
      historyList.innerHTML = historyWords.map(item => `
        <div class="history-item">
          ${item.en}
          <small>${item.tr}</small>
        </div>
      `).join('');
    }

    function showLearn() {
      currentTab = 'learn';
      sectionLabel.textContent = 'ÖĞREN';
      card.style.display = 'flex';
      nextBtn.style.display = 'block';
      historyList.style.display = 'none';
      emptyHistory.style.display = 'none';
      completeBox.style.display = completeBox.textContent ? completeBox.style.display : 'none';
      renderCard();
    }

    function showHistory() {
      currentTab = 'history';
      sectionLabel.textContent = 'GEÇMİŞ';
      card.style.display = 'flex';
      nextBtn.style.display = 'block';
      const first = historyWords[0];
      card.textContent = first ? first.en : 'APPLE';
      nextBtn.textContent = 'SONRAKİ';
      completeBox.style.display = 'none';
      renderHistory();
    }

    function render() {
      if (currentTab === 'learn') {
        showLearn();
      } else {
        showHistory();
      }
    }

    levelToggle.addEventListener('click', () => {
      levelMenu.classList.toggle('open');
    });

    learnTab.addEventListener('click', () => {
      render();
      showLearn();
    });

    historyTab.addEventListener('click', () => {
      showHistory();
    });

    card.addEventListener('click', () => {
      if (currentTab === 'learn') {
        currentSide = currentSide === 'en' ? 'tr' : 'en';
        renderCard();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentTab === 'learn') {
        addCurrentToHistory();
        const words = currentWords();
        if (currentIndex < words.length - 1) {
          currentIndex += 1;
          currentSide = 'en';
          completeBox.style.display = 'none';
        } else {
          const idx = levelKeys.indexOf(currentLevel);
          if (idx < levelKeys.length - 1) {
            const finished = currentLevel;
            currentLevel = levelKeys[idx + 1];
            currentIndex = 0;
            currentSide = 'en';
            completeBox.textContent = `${finished} bitti. Sıradaki seviye: ${currentLevel}`;
            completeBox.style.display = 'block';
          } else {
            completeBox.textContent = 'Tüm seviyeler bitti.';
            completeBox.style.display = 'block';
          }
        }
        saveState();
        renderCard();
      } else {
        if (historyWords.length === 0) return;
        const currentText = card.textContent;
        const currentHistoryIndex = historyWords.findIndex(item => item.en === currentText || item.tr === currentText);
        const nextHistoryIndex = currentHistoryIndex >= 0 && currentHistoryIndex < historyWords.length - 1 ? currentHistoryIndex + 1 : 0;
        card.textContent = historyWords[nextHistoryIndex].en;
      }
    });

    document.addEventListener('click', (e) => {
      if (!levelToggle.contains(e.target) && !levelMenu.contains(e.target)) {
        levelMenu.classList.remove('open');
      }
    });

    buildLevelMenu();
    render();
  </script>
</body>
</html>
